version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: carrent_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: carrent
      POSTGRES_PASSWORD: carrent_pass
      POSTGRES_DB: carrent_db
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: carrent_redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

  # اختياري: pgAdmin لتصفح قاعدة البيانات
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: carrent_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@carrent.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - '5050:80'
    depends_on:
      - postgres

volumes:
  postgres_data:
  redis_data:
